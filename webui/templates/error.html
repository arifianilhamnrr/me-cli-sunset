{% extends "base.html" %}
{% block title %}{{ title or "Error" }}{% endblock %}
{% block content %}
<div class="card max-w-3xl mx-auto p-6">
  <h1 class="text-2xl font-bold text-red-400 mb-2">{{ title or "Error" }}</h1>
  {% if message and ("\n" in message or "Traceback" in message) %}
  <pre class="text-xs text-slate-300 whitespace-pre-wrap rounded-xl p-3 overflow-auto max-h-[60vh]">{{ message }}</pre>
  {% else %}
  <p class="text-slate-300">{{ message }}</p>
  {% endif %}
  <a href="/" class="btn btn-secondary mt-4">Kembali</a>
</div>
{% endblock %}
